services:
  backend:
    build: ./backend
    container_name: ledens-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DATA_DIR: /data
    volumes:
      - ledens-data:/data
    networks:
      - ledens-net

  frontend:
    build: ./frontend
    container_name: ledens-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HOST_PORT:-8080}:80"
    networks:
      - ledens-net

networks:
  ledens-net:
    driver: bridge

volumes:
  ledens-data:
